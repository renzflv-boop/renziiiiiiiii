<style>
        .game-box {
            background: white;
            color: #001a4d;
            padding: 30px;
            border-radius: 15px;
            max-width: 600px;
            margin: 20px auto;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }
        .option-btn {
            display: block;
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 2px solid #4079c9;
            background: none;
            cursor: pointer;
            border-radius: 8px;
            font-size: 1rem;
            transition: all 0.2s;
        }
        .option-btn:hover {
            background: #4079c9;
            color: white;
        }
        #score-display { font-weight: bold; color: #4079c9; margin-bottom: 10px; }
    </style>
</head>
<body>

    <main class="container">
        <h1>HUMSS Trivia Challenge</h1>
        
        <div class="game-box" id="game-container">
            <div id="score-display">Score: 0</div>
            <h2 id="question">Loading Question...</h2>
            <div id="options">
                </div>
        </div>
    </main>

    <script>
        const questions = [
            {
                q: "Which branch of Social Science deals with the study of government and politics?",
                options: ["Sociology", "Political Science", "Anthropology", "Psychology"],
                answer: 1
            },
            {
                q: "What does the 'S' in HUMSS stand for?",
                options: ["Sciences", "Society", "Social", "Studies"],
                answer: 2
            },
            {
                q: "Who is known as the 'Father of Modern Psychology'?",
                options: ["Sigmund Freud", "Wilhelm Wundt", "B.F. Skinner", "Plato"],
                answer: 1
            },
            {
                q: "In Social Sciences, what is the study of human societies and their development?",
                options: ["Economics", "Geography", "Sociology", "Linguistics"],
                answer: 2
            }
        ];

        let currentQ = 0;
        let score = 0;

        function loadQuestion() {
            const qData = questions[currentQ];
            document.getElementById("question").innerText = qData.q;
            const optionsDiv = document.getElementById("options");
            optionsDiv.innerHTML = "";

            qData.options.forEach((opt, index) => {
                const btn = document.createElement("button");
                btn.innerText = opt;
                btn.className = "option-btn";
                btn.onclick = () => checkAnswer(index);
                optionsDiv.appendChild(btn);
            });
        }

        function checkAnswer(choice) {
            if (choice === questions[currentQ].answer) {
                score++;
                alert("Correct! Well done.");
            } else {
                alert("Incorrect. Keep studying!");
            }

            currentQ++;
            if (currentQ < questions.length) {
                document.getElementById("score-display").innerText = "Score: " + score;
                loadQuestion();
            } else {
                showResults();
            }
        }

        function showResults() {
            document.getElementById("game-container").innerHTML = `
                <h2>Quiz Complete!</h2>
                <p style="font-size: 1.5rem;">Your Final Score: ${score} / ${questions.length}</p>
                <a href="games.html" class="btn">Back to Games</a>
                <button onclick="location.reload()" class="btn" style="background:#4079c9; color:white; border:none; margin-left:10px; cursor:pointer;">Retry</button>
            `;
        }

        // Start the game
        loadQuestion();
    </script>

            </div>




        </div>
    </main>
